<style>
  html{-webkit-text-size-adjust:100%}
<style>
  :root{
    --bg:#0f1220; --panel:#1a1f33; --panel2:#222840; --text:#e8ebf5;
    --muted:#9aa3c0; --accent:#5b8cff; --accent2:#3f6bd6;
    --correct:#22c55e; --correct-bg:rgba(34,197,94,.15);
    --wrong:#ef4444; --wrong-bg:rgba(239,68,68,.15);
    --line:#2d3552; --radius:16px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;
    background:radial-gradient(1200px 800px at 70% -10%,#1c2546,transparent),var(--bg);
    color:var(--text);min-height:100vh;line-height:1.5}
  .wrap{max-width:820px;margin:0 auto;
    padding:calc(24px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) calc(60px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left))}
  header.top{text-align:center;margin:18px 0 26px}
  header.top h1{font-size:1.5rem;margin:0 0 6px;letter-spacing:.2px}
  header.top p{margin:0;color:var(--muted);font-size:.95rem}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    padding:22px;box-shadow:0 10px 40px rgba(0,0,0,.35)}
  .hidden{display:none}

  /* Start */
  .start h2{margin:0 0 4px;font-size:1.15rem}
  .start .sub{color:var(--muted);margin:0 0 20px;font-size:.92rem}
  .modes{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
  @media(max-width:520px){.modes{grid-template-columns:1fr}}
  .mode-btn{cursor:pointer;border:1px solid var(--line);background:var(--panel2);
    border-radius:14px;padding:18px;text-align:left;transition:.15s;color:var(--text)}
  .mode-btn:hover{border-color:var(--accent);transform:translateY(-2px)}
  .mode-btn .big{font-size:1.5rem;font-weight:700;display:block}
  .mode-btn .lbl{color:var(--muted);font-size:.88rem}
  .custom{display:flex;gap:10px;align-items:center;flex-wrap:wrap;
    border-top:1px solid var(--line);padding-top:16px;margin-top:4px}
  .custom label{color:var(--muted);font-size:.9rem}
  input[type=number]{width:90px;background:var(--bg);border:1px solid var(--line);
    color:var(--text);border-radius:10px;padding:9px 11px;font-size:1rem}
  .opts-row{display:flex;gap:18px;flex-wrap:wrap;margin-top:14px;color:var(--muted);font-size:.9rem}
  .opts-row label{display:flex;gap:8px;align-items:center;cursor:pointer}
  input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent)}

  button.btn{cursor:pointer;border:none;border-radius:12px;padding:11px 18px;
    font-size:.98rem;font-weight:600;background:var(--accent);color:#fff;transition:.15s}
  button.btn:hover{background:var(--accent2)}
  button.btn.ghost{background:transparent;border:1px solid var(--line);color:var(--text)}
  button.btn.ghost:hover{border-color:var(--accent)}
  button.btn:disabled{opacity:.4;cursor:not-allowed}

  /* Quiz */
  .quiz-top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:14px}
  .counter{font-size:.92rem;color:var(--muted)}
  .score{font-size:.92rem;color:var(--muted)}
  .score b{color:var(--correct)}
  .bar{height:8px;background:var(--panel2);border-radius:99px;overflow:hidden;margin-bottom:22px}
  .bar > div{height:100%;background:linear-gradient(90deg,var(--accent),#7aa2ff);width:0;transition:.3s}
  .qnum{color:var(--accent);font-weight:700;font-size:.85rem;letter-spacing:1px;text-transform:uppercase}
  .qtext{font-size:1.18rem;font-weight:600;margin:6px 0 20px}
  .options{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;gap:13px;align-items:flex-start;text-align:left;cursor:pointer;
    border:1.5px solid var(--line);background:var(--panel2);border-radius:13px;
    padding:14px 16px;color:var(--text);font-size:1rem;transition:.12s;width:100%}
  .opt:hover:not(.locked){border-color:var(--accent)}
  .opt .key{flex:0 0 26px;height:26px;border-radius:8px;background:var(--bg);
    border:1px solid var(--line);display:flex;align-items:center;justify-content:center;
    font-weight:700;font-size:.9rem;color:var(--muted)}
  .opt.correct{border-color:var(--correct);background:var(--correct-bg)}
  .opt.correct .key{background:var(--correct);color:#fff;border-color:var(--correct)}
  .opt.wrong{border-color:var(--wrong);background:var(--wrong-bg)}
  .opt.wrong .key{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .opt.locked{cursor:default}
  .opt.dim{opacity:.55}
  .mark{margin-left:auto;font-weight:700;font-size:1.1rem}

  .quiz-nav{display:flex;justify-content:space-between;gap:12px;margin-top:24px}
  .feedback{margin-top:16px;font-size:.95rem;min-height:1.4em}
  .feedback.ok{color:var(--correct)}
  .feedback.no{color:var(--wrong)}

  /* Results */
  .result h2{margin:0 0 6px}
  .big-score{font-size:3rem;font-weight:800;margin:8px 0}
  .big-score small{font-size:1.1rem;color:var(--muted);font-weight:500}
  .pct{color:var(--accent)}
  .review{margin-top:22px;text-align:left}
  .review h3{font-size:1rem;margin:0 0 12px;color:var(--muted)}
  .rev-item{border:1px solid var(--line);border-radius:12px;padding:13px 15px;margin-bottom:10px;background:var(--panel2)}
  .rev-item .rq{font-weight:600;margin-bottom:8px}
  .rev-line{font-size:.92rem;margin:3px 0}
  .rev-line.you{color:var(--wrong)}
  .rev-line.cor{color:var(--correct)}
  .result-actions{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-top:26px}
  .foot{text-align:center;color:var(--muted);font-size:.8rem;margin-top:26px}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <h1>Construcții din Zidărie și Beton Armat</h1>
    <p>Test grilă &middot; <span id="totalQ"></span> de întrebări</p>
  </header>

  <!-- START -->
  <section id="start" class="card start">
    <h2>Alege modul</h2>
    <p class="sub">Răspunde la întrebări și primești feedback imediat. Răspunsul corect e evidențiat.</p>
    <div class="modes">
      <button class="mode-btn" data-mode="45">
        <span class="big">45</span>
        <span class="lbl">grile aleatorii din toate</span>
      </button>
      <button class="mode-btn" data-mode="all">
        <span class="big" id="allCount">Toate</span>
        <span class="lbl">lucrează-le pe toate, în ordine</span>
      </button>
    </div>
    <div class="custom">
      <label for="customN">Sau un număr personalizat:</label>
      <input type="number" id="customN" min="1" placeholder="ex. 30">
      <button class="btn" id="startCustom">Start</button>
    </div>
    <div class="opts-row">
      <label><input type="checkbox" id="shuffleAns" checked> Amestecă ordinea variantelor</label>
      <label><input type="checkbox" id="instant" checked> Feedback imediat</label>
    </div>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="card hidden">
    <div class="quiz-top">
      <span class="counter" id="counter"></span>
      <span class="score" id="scoreLbl"></span>
    </div>
    <div class="bar"><div id="barFill"></div></div>
    <div class="qnum" id="qnum"></div>
    <div class="qtext" id="qtext"></div>
    <div class="options" id="options"></div>
    <div class="feedback" id="feedback"></div>
    <div class="quiz-nav">
      <button class="btn ghost" id="prevBtn">← Înapoi</button>
      <div style="display:flex;gap:10px">
        <button class="btn ghost" id="revealBtn">Arată răspunsul</button>
        <button class="btn" id="nextBtn">Următoarea →</button>
      </div>
    </div>
    <div class="foot"><button class="btn ghost" id="quitBtn" style="padding:6px 12px;font-size:.82rem">Renunță / Meniu</button></div>
  </section>

  <!-- RESULTS -->
  <section id="result" class="card result hidden" style="text-align:center">
    <h2>Rezultat final</h2>
    <div class="big-score"><span id="finalScore"></span><small id="finalOf"></small></div>
    <div class="pct" id="finalPct" style="font-size:1.2rem;font-weight:700"></div>
    <div id="finalMsg" style="color:var(--muted);margin-top:6px"></div>
    <div class="result-actions">
      <button class="btn" id="againSame">Reîncepe acest set</button>
      <button class="btn ghost" id="again45">45 noi aleatorii</button>
      <button class="btn ghost" id="backMenu">Meniu</button>
    </div>
    <div class="review" id="review"></div>
  </section>

  <div class="foot">Datele extrase din czb_raspunsuri.pdf · răspunsul corect = cel evidențiat cu roșu în PDF</div>
</div>

: false}, {"text": "Înlocuirea prefabricatelor uzate cu altele noi", "correct": false}]}, {"num": 220, "q": "Sistemul Peri este:", "options": [{"text": "Un sistem de prefabricare a construcțiilor de locuințe promovat în Franța, după război", "correct": false}, {"text": "Un sistem contemporan de prefabricare a construcțiilor de locuințe, folosit în Europa de vest", "correct": false}, {"text": "Un sistem de cofraje modulare de inventar, în prezent mult utilizat în România", "correct": true}]}, {"num": 221, "q": "Panourile de fațadă din GRC sunt:", "options": [{"text": "Panouri portante", "correct": false}, {"text": "Panouri ușoare", "correct": true}, {"text": "Panouri grele", "correct": false}]}, {"num": 222, "q": "Panourile prefabricate tristrat din beton cu nervuri:", "options": [{"text": "Sunt panouri cu punți termice străpunse", "correct": true}, {"text": "Sunt panouri ușoare cu “coaste” de rigidizare", "correct": false}, {"text": "Sunt panouri cu corpuri ceramice cu goluri", "correct": false}]}, {"num": 223, "q": "Construcțiile cu schelet multietajat prefabricat cu reazeme simple pot ﬁ stabilizate:", "options": [{"text": "Cu nuclee rigide ce grupează circulațiile verticale", "correct": true}, {"text": "Prin greutatea proprie și fundații încastrate", "correct": false}, {"text": "Cu fundații pe piloți cu descărcare prin aderență", "correct": false}]}, {"num": 224, "q": "De regulă, sistemele de hale prefabricate parter se bazează pe:", "options": [{"text": "Un sistem de stâlpi și grinzi simplu rezemate", "correct": true}, {"text": "Un sistem în cadre cu noduri rigide și travei unice", "correct": false}, {"text": "Un sistem monolitic de chesoane și stâlpi", "correct": false}]}, {"num": 225, "q": "În general, construcțiile în cadre prefabricate cu număr mare de nivele au:", "options": [{"text": "Stâlpi prefabricați + grinzi monolit pe 1 direcție", "correct": false}, {"text": "Stâlpi prefabricați + grinzi monolit pe 2 direcții", "correct": false}, {"text": "Stâlpi mono de nivele", "correct": false}, {"text": "5 nivele", "correct": false}]}, {"num": 239, "q": "Rolul principal al apareiajului este:", "options": [{"text": "Asigurarea continuității peretelui de zidărie", "correct": true}, {"text": "Crearea unui efect plastic la paramentele aparente", "correct": false}, {"text": "Posibilitatea asamblării uscate a elementelor de zidărie", "correct": false}]}, {"num": 240, "q": "Dimensiunile modulare ale unei cărămizi sunt:", "options": [{"text": "Mai mari ca dimensiunile nominale", "correct": true}, {"text": "Mai mici ca dimensiunile nominale", "correct": false}, {"text": "Egale cu dimensiunile nominale", "correct": false}]}, {"num": 241, "q": "În domeniul construcțiilor valoarea standardizată a modulului de bază este:", "options": [{"text": "1 m", "correct": false}, {"text": "10 cm", "correct": true}, {"text": "30 cm", "correct": false}]}, {"num": 242, "q": "Sunt “materiale pentru zidării”:", "options": [{"text": "Blocurile ceramice cu goluri", "correct": true}, {"text": "Plăcile rigide de vată minerală", "correct": false}, {"text": "Barele rotunde de oțel-beton", "correct": false}]}, {"num": 243, "q": "La ridicarea unei construcții din zidărie:", "options": [{"text": "Se zidesc concomitent toți pereții, asiză cu asiză", "correct": false}, {"text": "Pereții se zidesc unul după altul, în ordinea indicată de axele din proiect", "correct": false}, {"text": "Se zidesc mai întâi colțurile construcției, apoi zonele de mijloc ale pereților", "correct": true}]}, {"num": 244, "q": "La o construcție în cadre de beton armat, un perete de umplutură din zidărie:", "options": [{"text": "Este un perete portant conﬁnat cu elemente de beton armat", "correct": false}, {"text": "Nu este perete portant, deci poate ﬁ suprimat", "correct": false}, {"text": "Nu poate ﬁ suprimat decât cu măsuri speciale", "correct": true}]}, {"num": 245, "q": "Zidăria conﬁnată este formată din:", "options": [{"text": "Panouri de zidărie bordate cu proﬁle metalice", "correct": false}, {"text": "Panouri de zidărie între stâlpi și grinzi din beton armat", "correct": false}, {"text": "Panouri de zidărie înrămate cu elemente din beton armat", "correct": true}]}, {"num": 246, "q": "Pentru o construcție din zidărie în regim seismic se recomandă:", "options": [{"text": "O formă compactă, cu contur regulat, simetrică", "correct": true}, {"text": "O formă alungită pe direcția undei seismice", "correct": false}, {"text": "O formă ce urmărește curbele de nivel ale terenului", "correct": false}]}, {"num": 247, "q": "Regularitatea geometrică în plan a unei construcții din zidărie presupune:", "options": [{"text": "Formă compactă în plan, cu neregularități limitate", "correct": true}, {"text": "Proiectare pe bază de rețea modulară", "correct": false}, {"text": "Număr cât mai redus de travei structurale", "correct": false}]}, {"num": 248, "q": "La o construcție din zidărie numărul de nivele se limitează funcție de:", "options": [{"text": "Tipul mortarului din zidărie", "correct": false}, {"text": "Tipul materialelor legate din zidărie", "correct": true}, {"text": "Tipul acoperișului", "correct": false}]}, {"num": 249, "q": "La o structură din zidărie în sistem “fagure” distanța dintre pereții structurali este:", "options": [{"text": "Maximum 5.00m", "correct": true}, {"text": "Maximum 9.00m", "correct": false}, {"text": "Maximum 3.60m", "correct": false}]}, {"num": 250, "q": "La construcțiile noi din zidărie nearmată, prevederea centurilor:", "options": [{"text": "Este obligatorie în dreptul ﬁecărui planșeu", "correct": true}, {"text": "Nu este obligatorie la planșee din lemn", "correct": false}, {"text": "Este obligatorie la partea superioară a golurilor", "correct": false}]}, {"num": 251, "q": "La zidăria conﬁnată stâlpișorii se dispun:", "options": [{"text": "În colțurile ﬁecărui gol în planșeu", "correct": false}, {"text": "La toate intersecțiile de pereți structurali", "correct": true}, {"text": "În câmpul pereților, la maximum 6m distanță", "correct": false}]}, {"num": 252, "q": "Pentru o înălțime de etaj de 4.50m grosimea minimă a peretelui portant de zidărie conﬁnată este:", "options": [{"text": "20cm", "correct": false}, {"text": "25cm", "correct": false}, {"text": "30cm", "correct": true}]}, {"num": 253, "q": "Cintrul este:", "options": [{"text": "Cofrajul pe care se execută un arc din zidărie", "correct": true}, {"text": "Cofrajul în care se toarnă un stâlp circular", "correct": false}, {"text": "Denumirea unui tip de arc din cărămidă", "correct": false}]}, {"num": 254, "q": "La o construcție din zidărie, rigiditatea planșeului depinde de:", "options": [{"text": "Înălțimea de nivel a construcției", "correct": false}, {"text": "Dimensiunile și pozițiile golurilor mari în planșeu", "correct": true}, {"text": "Densitatea pereților pe care reazemă planșeul", "correct": false}]}, {"num": 255, "q": "La construcțiile din zidărie, fundațiile pot ﬁ realizate:", "options": [{"text": "Din blocuri de beton armat și cuzineți de beton simplu", "correct": false}, {"text": "Din blocuri de beton simplu", "correct": true}, {"text": "Din blocuri de beton celular autoclavizat", "correct": false}]}, {"num": 256, "q": "Tubul de dren se dispune pe perimetrul construcției:", "options": [{"text": "Pentru evacuarea apelor uzate din clădire", "correct": false}, {"text": "Pentru protecția clădirii împotriva inﬁltrațiilor de apă", "correct": true}, {"text": "Pentru facilitarea intervențiilor la fundație", "correct": false}]}, {"num": 257, "q": "Sistemul structural Dom-ino aparține lui:", "options": [{"text": "Hennebique", "correct": false}, {"text": "Freyssinet", "correct": false}, {"text": "Le Corbusier", "correct": true}]}, {"num": 258, "q": "Alcătuirea constructivă a fundațiilor se decide în funcție de:", "options": [{"text": "Natura terenului și încărcări", "correct": true}, {"text": "Materialele folosite la închideri", "correct": false}, {"text": "Temperatura minimă anuală", "correct": false}]}];
const LETTERS = ["A","B","C","D","E"];

document.getElementById('totalQ').textContent = ALL.length;
document.getElementById('allCount').textContent = "Toate " + ALL.length;

let state = null;

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function buildSet(mode){
  const shuffleAns = document.getElementById('shuffleAns').checked;
  const instant = document.getElementById('instant').checked;
  let pool;
  if(mode==='all'){ pool = ALL.slice(); }
  else { pool = shuffle(ALL).slice(0, Math.min(mode, ALL.length)); }
  const items = pool.map(q=>{
    let opts = q.options.map((o,i)=>({text:o.text, correct:!!o.correct}));
    if(shuffleAns) opts = shuffle(opts);
    return {num:q.num, q:q.q, opts, chosen:null};
  });
  state = {items, idx:0, instant};
  show('quiz');
  render();
}

function show(which){
  for(const id of ['start','quiz','result']) document.getElementById(id).classList.add('hidden');
  document.getElementById(which).classList.remove('hidden');
  window.scrollTo({top:0,behavior:'smooth'});
}

function render(){
  const s = state, it = s.items[s.idx];
  document.getElementById('counter').textContent = `Întrebarea ${s.idx+1} din ${s.items.length}`;
  const answered = s.items.filter(x=>x.chosen!==null).length;
  const correct = s.items.filter(x=>x.chosen!==null && x.opts[x.chosen].correct).length;
  document.getElementById('scoreLbl').innerHTML = `Corecte: <b>${correct}</b> / ${answered}`;
  document.getElementById('barFill').style.width = ((s.idx)/s.items.length*100)+'%';
  document.getElementById('qnum').textContent = `Grila #${it.num}`;
  document.getElementById('qtext').textContent = it.q;

  const box = document.getElementById('options');
  box.innerHTML='';
  const locked = it.chosen!==null;
  it.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='opt'+(locked?' locked':'');
    b.innerHTML=`<span class="key">${LETTERS[i]}</span><span>${escapeHtml(o.text)}</span>`;
    if(locked){
      const revealCorrect = s.instant || true; // always reveal once answered
      if(o.correct){ b.classList.add('correct'); b.querySelector('span:last-child').insertAdjacentHTML('beforeend',' '); b.insertAdjacentHTML('beforeend','<span class="mark">✓</span>'); }
      else if(i===it.chosen){ b.classList.add('wrong'); b.insertAdjacentHTML('beforeend','<span class="mark">✗</span>'); }
      else b.classList.add('dim');
    } else {
      b.onclick=()=>choose(i);
    }
    box.appendChild(b);
  });

  const fb=document.getElementById('feedback');
  fb.className='feedback';fb.textContent='';
  if(locked){
    const ok=it.opts[it.chosen].correct;
    fb.classList.add(ok?'ok':'no');
    fb.textContent = ok ? 'Corect!' : 'Greșit — răspunsul corect e evidențiat.';
  }
  document.getElementById('prevBtn').disabled = s.idx===0;
  document.getElementById('revealBtn').disabled = locked;
  const last = s.idx===s.items.length-1;
  document.getElementById('nextBtn').textContent = last ? 'Vezi rezultatul' : 'Următoarea →';
}

function choose(i){
  const it=state.items[state.idx];
  if(it.chosen!==null) return;
  it.chosen=i;
  render();
}

function reveal(){
  const it=state.items[state.idx];
  if(it.chosen!==null) return;
  // mark as revealed with no chosen wrong: set chosen to the correct index so it shows, but count as not answered?
  it.chosen = it.opts.findIndex(o=>o.correct);
  it.revealed = true;
  render();
}

function next(){
  if(state.idx===state.items.length-1){ finish(); }
  else { state.idx++; render(); }
}
function prev(){ if(state.idx>0){ state.idx--; render(); } }

function finish(){
  const s=state;
  const total=s.items.length;
  const correct=s.items.filter(x=>x.chosen!==null && !x.revealed && x.opts[x.chosen].correct).length;
  document.getElementById('barFill').style.width='100%';
  document.getElementById('finalScore').textContent=correct;
  document.getElementById('finalOf').textContent=' / '+total;
  const pct=Math.round(correct/total*100);
  document.getElementById('finalPct').textContent=pct+'%';
  let msg;
  if(pct>=90) msg='Excelent! 🎉';
  else if(pct>=70) msg='Bine! Mai exersează zonele slabe.';
  else if(pct>=50) msg='Acceptabil — mai e de lucru.';
  else msg='Mai exersează, o să meargă! 💪';
  document.getElementById('finalMsg').textContent=msg;

  const wrong=s.items.filter(x=>x.chosen===null || x.revealed || !x.opts[x.chosen].correct);
  const rev=document.getElementById('review');
  if(wrong.length===0){ rev.innerHTML='<h3>Toate corecte! Nimic de revizuit.</h3>'; }
  else{
    rev.innerHTML='<h3>De revizuit ('+wrong.length+')</h3>';
    wrong.forEach(it=>{
      const cor=it.opts.find(o=>o.correct);
      const you = (it.chosen!==null && !it.revealed) ? it.opts[it.chosen].text : '— (necompletat)';
      const d=document.createElement('div');d.className='rev-item';
      d.innerHTML=`<div class="rq">#${it.num}. ${escapeHtml(it.q)}</div>`+
        `<div class="rev-line you">Răspunsul tău: ${escapeHtml(you)}</div>`+
        `<div class="rev-line cor">Corect: ${escapeHtml(cor.text)}</div>`;
      rev.appendChild(d);
    });
  }
  show('result');
}

function escapeHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

// events
document.querySelectorAll('.mode-btn').forEach(b=>{
  b.onclick=()=>{ const m=b.dataset.mode; buildSet(m==='45'?45:'all'); };
});
document.getElementById('startCustom').onclick=()=>{
  const n=parseInt(document.getElementById('customN').value,10);
  if(n>0) buildSet(n);
};
document.getElementById('customN').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('startCustom').click();});
document.getElementById('nextBtn').onclick=next;
document.getElementById('prevBtn').onclick=prev;
document.getElementById('revealBtn').onclick=reveal;
document.getElementById('quitBtn').onclick=()=>{ if(confirm('Sigur renunți la testul curent?')) show('start'); };
document.getElementById('againSame').onclick=()=>{ state.items.forEach(it=>{it.chosen=null;it.revealed=false;}); state.idx=0; show('quiz'); render(); };
document.getElementById('again45').onclick=()=>buildSet(45);
document.getElementById('backMenu').onclick=()=>show('start');

// keyboard
document.addEventListener('keydown',e=>{
  if(document.getElementById('quiz').classList.contains('hidden')) return;
  if(['1','2','3','4','5'].includes(e.key)){ const i=+e.key-1; const it=state.items[state.idx]; if(it.chosen===null && i<it.opts.length) choose(i); }
  else if(e.key==='ArrowRight') next();
  else if(e.key==='ArrowLeft') prev();
});
</script>
